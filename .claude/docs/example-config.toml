# =============================================================================
# Crossler — example configuration (TOML format)
# Hypothetical complex project: "myapp" — a CLI tool with daemon and GUI helper
# =============================================================================
#
# This file demonstrates the full feature set of a Crossler config.
# In practice, most projects will use a small subset of these options.
#
# Variable substitution is available in most string fields (expand = true):
#   ${VERSION}       — version string from --version flag or env
#   ${GOOS}          — target OS (linux, darwin, windows)
#   ${GOARCH}        — target arch (amd64, arm64)
#   ${EXE}           — ".exe" on Windows, "" otherwise
#   ${BUILD_NUMBER}  — CI build number (if available)


# -----------------------------------------------------------------------------
# METADATA — common to all platforms and formats
# -----------------------------------------------------------------------------

name        = "myapp"
version     = "2.4.1"       # semver; Windows MSI requires 2.4.1.0 (auto-padded)
description = """\
  My Application is a cross-platform tool for doing important things. \
  Supports Linux, macOS and Windows natively.\
  """
maintainer  = "PowerTech <dev@powertech.example.com>"
vendor      = "PowerTech LLC"
homepage    = "https://github.com/powertech-center/myapp"
license     = "Apache-2.0"

# Formats to build. Each enabled format goes through its backend.
# Crossler auto-selects the right backend per platform.
formats = ["deb", "rpm", "apk", "msi", "pkg", "dmg", "tar.gz", "homebrew"]
#           Linux ──────────── Win  macOS──  all      formula


# -----------------------------------------------------------------------------
# FILES — installed on all platforms unless overridden
# -----------------------------------------------------------------------------
#
# Fields:
#   src      — source path on build machine; supports globs and ${VARS}
#   dst      — absolute install path (Unix-style for Linux/macOS)
#   win_dst  — install path on Windows, relative to INSTALLFOLDER
#              (omit if the file is not installed on Windows)
#   type     — "file" (default) | "config" | "config|noreplace" | "symlink" |
#              "dir" | "doc" | "license" | "ghost" | "tree"
#   mode     — POSIX permissions as integer (octal literal: 0o755)
#   owner    — file owner (ignored on Windows)
#   group    — file group (ignored on Windows)
#   expand   — if true, expand ${VARS} in src and dst at build time
#
# TOML note: each [[files]] block is one array-of-tables entry.

# Main executable — arch-specific build artifact
[[files]]
src     = "dist/${GOOS}_${GOARCH}/myapp${EXE}"
dst     = "/usr/local/bin/myapp"
win_dst = "myapp.exe"
mode    = 0o755
expand  = true

# Daemon binary (not installed on Windows — no win_dst)
[[files]]
src    = "dist/${GOOS}_${GOARCH}/myappd${EXE}"
dst    = "/usr/local/bin/myappd"
mode   = 0o755
expand = true

# Default configuration file — preserved on upgrade (Linux only; see note)
#
# type = "config|noreplace" means the package manager will NOT overwrite this
# file if the user has modified it. On macOS/Windows there is no equivalent
# mechanism — the file is simply copied (handled via postinstall script if needed).
[[files]]
src     = "config/myapp.yaml"
dst     = "/etc/myapp/myapp.yaml"
win_dst = "config\\myapp.yaml"
type    = "config|noreplace"
mode    = 0o644
owner   = "root"
group   = "root"

# Man page (Linux/macOS only — no win_dst)
[[files]]
src  = "docs/myapp.1.gz"
dst  = "/usr/local/share/man/man1/myapp.1.gz"
type = "doc"
mode = 0o644

# Systemd unit (Linux only)
[[files]]
src  = "dist/myapp.service"
dst  = "/lib/systemd/system/myapp.service"
mode = 0o644

# Data directory — must be created with correct permissions
#
# type = "dir" creates an empty directory with the given owner/permissions.
# The package manager will remove it on uninstall only if it is empty.
[[files]]
dst   = "/var/lib/myapp"
type  = "dir"
mode  = 0o750
owner = "myapp"
group = "myapp"

# Log file ghost (RPM only)
#
# type = "ghost" registers the entry in the RPM database without shipping it.
# Useful for log/state files that the daemon creates at runtime, so
# `rpm -V` doesn't complain about their absence.
[[files]]
dst  = "/var/log/myapp.log"
type = "ghost"

# Recursive documentation tree
#
# type = "tree" installs the entire source directory recursively.
# Equivalent to: cp -r docs/ /usr/share/doc/myapp/
[[files]]
src  = "docs/"
dst  = "/usr/share/doc/myapp/"
type = "tree"
mode = 0o644

# License file
[[files]]
src  = "LICENSE"
dst  = "/usr/share/licenses/myapp/LICENSE"
type = "license"

# Symlink: /usr/bin/myapp → /usr/local/bin/myapp
#
# type = "symlink" — src is the link target (where it points),
# dst is the link path that will be created on the filesystem.
[[files]]
src  = "/usr/local/bin/myapp"
dst  = "/usr/bin/myapp"
type = "symlink"


# -----------------------------------------------------------------------------
# SCRIPTS — lifecycle hooks
# -----------------------------------------------------------------------------
#
# Linux (nfpm): all four hooks are supported
# macOS (pkgbuild): preinstall and postinstall only
# Windows (wixl): limited — custom actions via EXE only; skipped by default
#
# Scripts receive platform-specific arguments on macOS:
#   $1=pkg_path  $2=install_location  $3=target_volume  $4=script_name

[scripts]
preinstall  = "scripts/preinstall.sh"
postinstall = "scripts/postinstall.sh"
preremove   = "scripts/preremove.sh"    # Linux only
postremove  = "scripts/postremove.sh"   # Linux only


# -----------------------------------------------------------------------------
# DEPENDENCIES — Linux only (no equivalent in MSI or macOS .pkg)
# -----------------------------------------------------------------------------
#
# Syntax depends on the format. Crossler normalises the base form and
# applies format-specific syntax automatically. Use overrides (below)
# when you need per-format dependency strings.
#
# depends     — hard dependency; package manager refuses to install without it
# recommends  — soft; auto-installed by apt/dnf if possible, ignored by apk
# suggests    — informational only; never auto-installed
# conflicts   — cannot be installed alongside this package
# replaces    — replaces/supersedes another package
# provides    — declares a virtual package name this package satisfies

[dependencies]
depends      = ["curl", "bash"]
recommends   = ["jq", "docker"]
suggests     = ["myapp-plugins"]
conflicts    = ["myapp-legacy"]
replaces     = ["myapp-legacy"]
provides     = ["myapp-ng"]


# -----------------------------------------------------------------------------
# PLATFORM OVERRIDES — [platforms.<os>]
# -----------------------------------------------------------------------------
#
# Settings here override or extend the base configuration for a specific OS.
# Any base-level field can be overridden here.


# ── Linux ─────────────────────────────────────────────────────────────────────

[platforms.linux]
# (no simple scalar overrides needed at the Linux platform level in this example)

# Linux-only files: bash-completion
[[platforms.linux.files]]
src  = "dist/myapp-completion.bash"
dst  = "/usr/share/bash-completion/completions/myapp"
mode = 0o644

# Format-level overrides — [platforms.linux.formats.<format>]

[platforms.linux.formats.deb]
# Debian-style version constraints use parentheses and spaces
depends     = ["curl (>= 7.68)", "bash (>= 5.0)", "libsystemd0"]
predepends  = ["libc6 (>= 2.17)"]
# dpkg triggers: notify other packages about changes
triggers    = { interest = ["/usr/lib/python3/dist-packages"] }

[platforms.linux.formats.deb.scripts]
# deb postinstall may call `systemctl enable myapp` or `deb-systemd-helper`
postinstall = "scripts/postinstall-deb.sh"

[platforms.linux.formats.rpm]
# RPM-style: space-separated, no parentheses
depends     = ["curl >= 7.68", "bash >= 5.0", "systemd-libs"]
# RPM release tag: usually "1" or "1.el8", "1.fc39" for distro-specific builds
release     = "1"
# Compression algorithm for the archive inside the RPM.
# zstd = fastest; xz = smallest; gzip = most compatible
compression = "zstd"

[platforms.linux.formats.rpm.scripts]
# Extended RPM hooks unavailable in other formats
pretrans  = "scripts/pretrans.sh"   # before transaction starts
posttrans = "scripts/posttrans.sh"  # after transaction completes

[platforms.linux.formats.apk]
# Alpine-style: no spaces around operators
depends = ["curl>=7.68", "bash>=5.0"]

[platforms.linux.formats.apk.scripts]
postinstall = "scripts/postinstall-apk.sh"


# ── Windows ───────────────────────────────────────────────────────────────────

[platforms.windows]
# (no simple scalar overrides at the Windows platform level)

# Windows-only files
[[platforms.windows.files]]
src    = "dist/windows_${GOARCH}/myapp-helper.exe"
win_dst = "myapp-helper.exe"
mode   = 0o755
expand = true

[[platforms.windows.files]]
src    = "assets/myapp.ico"
win_dst = "myapp.ico"

[platforms.windows.formats.msi]
# UpgradeCode is the stable product identity — NEVER change it.
# Changing UpgradeCode breaks the upgrade path; Windows will install
# a second copy instead of upgrading the existing one.
upgrade_code  = "A1B2C3D4-E5F6-7890-ABCD-EF1234567890"
# perMachine = all users (C:\Program Files); perUser = current user only
install_scope = "perMachine"

# Windows registry entries written by the installer
[[platforms.windows.formats.msi.registry]]
root = "HKLM"                           # HKLM | HKCU | HKCR | HKMU
key  = "Software\\PowerTech\\MyApp"

  [[platforms.windows.formats.msi.registry.values]]
  name  = "InstallPath"
  type  = "string"                      # string | integer | binary | expandable
  value = "[INSTALLFOLDER]"

  [[platforms.windows.formats.msi.registry.values]]
  name  = "Version"
  type  = "string"
  value = "2.4.1"

# Start Menu / Desktop shortcuts
[[platforms.windows.formats.msi.shortcuts]]
location    = "StartMenu"               # StartMenu | Desktop | ProgramMenuFolder
name        = "MyApp"
target      = "[INSTALLFOLDER]myapp.exe"
arguments   = "--gui"
icon        = "[INSTALLFOLDER]myapp.ico"
description = "Launch MyApp"

# File type associations
[[platforms.windows.formats.msi.file_associations]]
extension   = ".myapp"
prog_id     = "MyApp.Document"
description = "MyApp Document"
target      = "[INSTALLFOLDER]myapp.exe"
argument    = '"%1"'

# MSI installer conditions (prevent installation on unsupported Windows)
[[platforms.windows.formats.msi.conditions]]
check   = "os_version"
minimum = "6.1"                         # Require Windows 7 or later


# ── macOS ─────────────────────────────────────────────────────────────────────

[platforms.macos]
# Reverse-DNS identifier — must be unique per product
identifier = "com.powertech.myapp"

# macOS-only files
[[platforms.macos.files]]
src   = "dist/myapp.plist"
dst   = "/Library/LaunchDaemons/com.powertech.myapp.plist"
mode  = 0o644
owner = "root"
group = "wheel"

[platforms.macos.formats.pkg]
# Component property list controls installer behavior for bundles.
# For simple CLI tools this section is usually not needed.
[[platforms.macos.formats.pkg.component_plist]]
bundle_path  = "usr/local/bin/myapp"
relocatable  = false

[platforms.macos.formats.dmg]
# Image format: ULFO (lzfse) is recommended for modern macOS;
# UDZO (zlib) for maximum compatibility with older systems.
format      = "ULFO"
volume_name = "MyApp 2.4.1"
background_image = "assets/dmg-background.png"
icon_size   = 96
window_size = [800, 400]

# Position of icons inside the DMG window
[[platforms.macos.formats.dmg.icon_positions]]
name = "MyApp.app"
x    = 200
y    = 190

[[platforms.macos.formats.dmg.icon_positions]]
name = "Applications"   # drag-to-install symlink
x    = 600
y    = 190


# -----------------------------------------------------------------------------
# ARCHITECTURE OVERRIDES — [architectures.<arch>]
# -----------------------------------------------------------------------------
#
# Applied after platform overrides. Use sparingly — most differences are
# already handled by ${GOARCH} variable expansion in file paths.

[architectures.arm64]
# Example: ship an arm64-specific tuning config

[[architectures.arm64.files]]
src  = "config/myapp-arm64.yaml"
dst  = "/etc/myapp/arch.yaml"
type = "config"
mode = 0o644


# -----------------------------------------------------------------------------
# SIGNING — Authenticode (Windows)
# -----------------------------------------------------------------------------
#
# Authenticode is applied in two stages (order matters):
#   1. Sign the .exe binary BEFORE packaging → the MSI contains a signed EXE
#   2. Sign the .msi AFTER wixl creates it
#
# Tool selection is automatic based on build host:
#   Linux/macOS host → osslsigncode
#   Windows host     → signtool.exe
#
# Certificate formats accepted:
#   - Path to a .pfx / .p12 file
#   - "base64:<base64-encoded-pfx>" — for storing certs in CI secrets
#   - "env:<VAR_NAME>" — read path from environment variable
#
# Use RFC 3161 timestamp servers so signatures stay valid after cert expiry.
# Multiple TSA URLs increase reliability (tried in order).

[sign_windows]
certificate     = "env:WIN_CERT_PFX"
password        = "env:WIN_CERT_PASS"
timestamp_url   = [
  "http://timestamp.digicert.com",
  "http://timestamp.sectigo.com",
]
hash_algorithm  = "sha256"                  # always sha256; sha1 is deprecated
description     = "MyApp by PowerTech"     # shown in UAC elevation dialog
url             = "https://powertech.example.com"


# -----------------------------------------------------------------------------
# SIGNING — Apple Code Signing + Notarization (macOS)
# -----------------------------------------------------------------------------
#
# Apple signing is applied in stages:
#   1. Sign the binary BEFORE packaging
#   2. Build .pkg or .dmg
#   3. Sign the .pkg / .dmg
#   4. Notarize (submit to Apple servers, wait for ticket)
#   5. Staple the notarization ticket into the file
#
# Tool selection by host:
#   macOS host         → codesign + notarytool (native, requires Keychain)
#   Linux/Windows host → rcodesign (open-source, works without macOS)
#
# Hardened Runtime (code_signature_flags = "runtime") is MANDATORY for notarization.
# Without it, Apple will reject the submission.
#
# entitlements: plist file with capability declarations.
# Most CLI tools don't need any entitlements — omit the field.
#
# api_key_file: App Store Connect API key JSON for notarytool / rcodesign.

[sign_macos]
certificate          = "env:MAC_CERT_P12"
password             = "env:MAC_CERT_PASS"

# For native codesign on macOS (identity from Keychain)
identity             = "Developer ID Application: PowerTech LLC (ABCD1234EF)"

# Hardened Runtime — required for notarization
code_signature_flags = "runtime"

# Entitlements (usually empty for CLI tools — uncomment if needed)
# entitlements = "entitlements.plist"

# Notarization via App Store Connect API key
notarize             = true
api_key_file         = "env:NOTARY_API_KEY_JSON"
notary_wait_seconds  = 3600

# Staple the ticket into the package (allows offline Gatekeeper verification)
staple               = true


# -----------------------------------------------------------------------------
# HOMEBREW FORMULA
# -----------------------------------------------------------------------------
#
# Crossler generates a .rb formula from metadata above + SHA256 of tar.gz
# archives (computed automatically after build). The formula is written to
# homebrew/Formula/myapp.rb and can be committed to a Homebrew tap repo.
#
# The generated formula downloads the correct archive for the user's platform
# and arch, and installs the binary + man page.
#
# test_command: a simple shell command to verify the installation.

[homebrew]
tap          = "powertech-center/tap"               # GitHub repo: powertech-center/homebrew-tap
formula_path = "homebrew/Formula/myapp.rb"
test_command = "myapp --version"
# Optional: additional install steps added to the formula's install block
install_extras = [
  'bash_completion.install "dist/myapp-completion.bash" => "myapp"',
  'man1.install "docs/myapp.1"',
]
