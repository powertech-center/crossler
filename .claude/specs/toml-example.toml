# =============================================================================
# Crossler — пример конфигурации (формат TOML)
# Гипотетический сложный проект: "myapp" — CLI-утилита с демоном и GUI-хелпером
# =============================================================================
#
# Файл демонстрирует полный набор возможностей конфига Crossler.
# На практике большинство проектов использует небольшое подмножество этих настроек.
#
# Подстановка переменных доступна в большинстве строковых полей (expand = true):
#   ${VERSION}       — строка версии из флага --version или переменной окружения
#   ${GOOS}          — целевая ОС (linux, darwin, windows)
#   ${GOARCH}        — целевая архитектура (amd64, arm64)
#   ${EXE}           — ".exe" на Windows, "" в остальных случаях
#   ${BUILD_NUMBER}  — номер сборки CI (если доступен)


# -----------------------------------------------------------------------------
# МЕТАДАННЫЕ — общие для всех платформ и форматов
# -----------------------------------------------------------------------------

name        = "myapp"
version     = "2.4.1"       # semver; для Windows MSI автоматически дополняется до 2.4.1.0
description = """\
  My Application is a cross-platform tool for doing important things. \
  Supports Linux, macOS and Windows natively.\
  """
maintainer  = "PowerTech <dev@powertech.example.com>"
vendor      = "PowerTech LLC"
homepage    = "https://github.com/powertech-center/myapp"
license     = "Apache-2.0"

# Форматы для сборки. Каждый формат обрабатывается своим бэкендом.
# Crossler автоматически выбирает нужный бэкенд в зависимости от платформы.
formats = ["deb", "rpm", "apk", "msi", "pkg", "dmg", "tar.gz", "homebrew"]
#           Linux ──────────── Win  macOS──  все     формула


# -----------------------------------------------------------------------------
# ФАЙЛЫ — устанавливаются на всех платформах, если не переопределено
# -----------------------------------------------------------------------------
#
# Поля:
#   src      — путь к файлу на машине сборки; поддерживает glob-шаблоны и ${VARS}
#   dst      — абсолютный путь установки (Unix-стиль для Linux/macOS)
#   win_dst  — путь установки на Windows, относительно INSTALLFOLDER
#              (не указывать, если файл не устанавливается на Windows)
#   type     — "file" (по умолчанию) | "config" | "config|noreplace" | "symlink" |
#              "dir" | "doc" | "license" | "ghost" | "tree"
#   mode     — права доступа POSIX как целое число (восьмеричный литерал: 0o755)
#   owner    — владелец файла (игнорируется на Windows)
#   group    — группа файла (игнорируется на Windows)
#   expand   — если true, раскрывает ${VARS} в полях src и dst во время сборки
#
# Замечание по TOML: каждый блок [[files]] — одна запись в массиве таблиц.

# Основной исполняемый файл — артефакт сборки под конкретную архитектуру
[[files]]
src     = "dist/${GOOS}_${GOARCH}/myapp${EXE}"
dst     = "/usr/local/bin/myapp"
win_dst = "myapp.exe"
mode    = 0o755
expand  = true

# Бинарник демона (на Windows не устанавливается — нет win_dst)
[[files]]
src    = "dist/${GOOS}_${GOARCH}/myappd${EXE}"
dst    = "/usr/local/bin/myappd"
mode   = 0o755
expand = true

# Конфигурационный файл по умолчанию — сохраняется при обновлении (только Linux; см. ниже)
#
# type = "config|noreplace" означает, что пакетный менеджер НЕ перезапишет этот файл,
# если пользователь его изменил. На macOS и Windows аналогичного механизма нет —
# файл просто копируется (при необходимости обрабатывается через postinstall-скрипт).
[[files]]
src     = "config/myapp.yaml"
dst     = "/etc/myapp/myapp.yaml"
win_dst = "config\\myapp.yaml"
type    = "config|noreplace"
mode    = 0o644
owner   = "root"
group   = "root"

# Man-страница (только Linux/macOS — нет win_dst)
[[files]]
src  = "docs/myapp.1.gz"
dst  = "/usr/local/share/man/man1/myapp.1.gz"
type = "doc"
mode = 0o644

# Systemd-юнит (только Linux)
[[files]]
src  = "dist/myapp.service"
dst  = "/lib/systemd/system/myapp.service"
mode = 0o644

# Директория данных — создаётся с нужными правами доступа
#
# type = "dir" создаёт пустую директорию с указанным владельцем и правами.
# Пакетный менеджер удалит её при деинсталляции только если она пуста.
[[files]]
dst   = "/var/lib/myapp"
type  = "dir"
mode  = 0o750
owner = "myapp"
group = "myapp"

# Лог-файл ghost (только RPM)
#
# type = "ghost" регистрирует запись в базе данных RPM, не устанавливая сам файл.
# Полезно для лог-файлов и файлов состояния, которые демон создаёт в рантайме —
# тогда `rpm -V` не будет жаловаться на их отсутствие.
[[files]]
dst  = "/var/log/myapp.log"
type = "ghost"

# Рекурсивное дерево документации
#
# type = "tree" устанавливает всю директорию рекурсивно.
# Эквивалентно: cp -r docs/ /usr/share/doc/myapp/
[[files]]
src  = "docs/"
dst  = "/usr/share/doc/myapp/"
type = "tree"
mode = 0o644

# Файл лицензии
[[files]]
src  = "LICENSE"
dst  = "/usr/share/licenses/myapp/LICENSE"
type = "license"

# Символическая ссылка: /usr/bin/myapp → /usr/local/bin/myapp
#
# type = "symlink" — src это цель ссылки (куда указывает),
# dst — путь, по которому будет создана ссылка на файловой системе.
[[files]]
src  = "/usr/local/bin/myapp"
dst  = "/usr/bin/myapp"
type = "symlink"


# -----------------------------------------------------------------------------
# СКРИПТЫ — хуки жизненного цикла пакета
# -----------------------------------------------------------------------------
#
# Linux (nfpm): поддерживаются все четыре хука
# macOS (pkgbuild): только preinstall и postinstall
# Windows (wixl): ограниченная поддержка — только через CustomAction (EXE); по умолчанию пропускается
#
# На macOS скрипты получают аргументы:
#   $1=pkg_path  $2=install_location  $3=target_volume  $4=script_name

[scripts]
preinstall  = "scripts/preinstall.sh"
postinstall = "scripts/postinstall.sh"
preremove   = "scripts/preremove.sh"    # только Linux
postremove  = "scripts/postremove.sh"   # только Linux


# -----------------------------------------------------------------------------
# ЗАВИСИМОСТИ — только Linux (аналога нет в MSI и macOS .pkg)
# -----------------------------------------------------------------------------
#
# Синтаксис зависит от формата. Crossler нормализует базовую форму и автоматически
# применяет синтаксис конкретного формата. Используйте overrides (ниже), если нужны
# специфические строки зависимостей для отдельного формата.
#
# depends     — жёсткая зависимость; пакетный менеджер откажет в установке без неё
# recommends  — мягкая; автоустанавливается apt/dnf если возможно, игнорируется apk
# suggests    — только информационная; никогда не устанавливается автоматически
# conflicts   — пакеты, несовместимые с данным
# replaces    — пакеты, которые данный заменяет/вытесняет
# provides    — виртуальные пакеты, которые данный пакет предоставляет

[dependencies]
depends      = ["curl", "bash"]
recommends   = ["jq", "docker"]
suggests     = ["myapp-plugins"]
conflicts    = ["myapp-legacy"]
replaces     = ["myapp-legacy"]
provides     = ["myapp-ng"]


# -----------------------------------------------------------------------------
# ПЕРЕОПРЕДЕЛЕНИЯ ДЛЯ ПЛАТФОРМ — [platforms.<os>]
# -----------------------------------------------------------------------------
#
# Настройки здесь переопределяют или дополняют базовую конфигурацию для конкретной ОС.
# Любое поле верхнего уровня может быть переопределено.


# ── Linux ─────────────────────────────────────────────────────────────────────

[platforms.linux]
# (в данном примере скалярных переопределений на уровне платформы Linux нет)

# Файлы только для Linux: bash-completion
[[platforms.linux.files]]
src  = "dist/myapp-completion.bash"
dst  = "/usr/share/bash-completion/completions/myapp"
mode = 0o644

# Переопределения на уровне формата — [platforms.linux.formats.<format>]

[platforms.linux.formats.deb]
# Debian-стиль: ограничения версий в круглых скобках с пробелами
depends     = ["curl (>= 7.68)", "bash (>= 5.0)", "libsystemd0"]
predepends  = ["libc6 (>= 2.17)"]
# dpkg-триггеры: уведомляют другие пакеты об изменениях
triggers    = { interest = ["/usr/lib/python3/dist-packages"] }

[platforms.linux.formats.deb.scripts]
# postinstall для deb может вызывать `systemctl enable myapp` или `deb-systemd-helper`
postinstall = "scripts/postinstall-deb.sh"

[platforms.linux.formats.rpm]
# RPM-стиль: через пробел, без круглых скобок
depends     = ["curl >= 7.68", "bash >= 5.0", "systemd-libs"]
# Тег release RPM: обычно "1" или "1.el8", "1.fc39" для дистрибутивоспецифичных сборок
release     = "1"
# Алгоритм сжатия архива внутри RPM:
# zstd — самый быстрый; xz — наименьший размер; gzip — максимальная совместимость
compression = "zstd"

[platforms.linux.formats.rpm.scripts]
# Расширенные хуки RPM, недоступные в других форматах
pretrans  = "scripts/pretrans.sh"   # до начала транзакции
posttrans = "scripts/posttrans.sh"  # после завершения транзакции

[platforms.linux.formats.apk]
# Alpine-стиль: без пробелов вокруг операторов
depends = ["curl>=7.68", "bash>=5.0"]

[platforms.linux.formats.apk.scripts]
postinstall = "scripts/postinstall-apk.sh"


# ── Windows ───────────────────────────────────────────────────────────────────

[platforms.windows]
# (скалярных переопределений на уровне платформы Windows нет)

# Файлы только для Windows
[[platforms.windows.files]]
src     = "dist/windows_${GOARCH}/myapp-helper.exe"
win_dst = "myapp-helper.exe"
mode    = 0o755
expand  = true

[[platforms.windows.files]]
src     = "assets/myapp.ico"
win_dst = "myapp.ico"

[platforms.windows.formats.msi]
# UpgradeCode — стабильный идентификатор продукта. НИКОГДА не меняйте его.
# Изменение UpgradeCode нарушает цепочку обновлений: Windows установит
# второй экземпляр программы вместо обновления существующего.
upgrade_code  = "A1B2C3D4-E5F6-7890-ABCD-EF1234567890"
# perMachine = для всех пользователей (C:\Program Files); perUser = только текущий пользователь
install_scope = "perMachine"

# Записи реестра Windows, создаваемые инсталлятором
[[platforms.windows.formats.msi.registry]]
root = "HKLM"                           # HKLM | HKCU | HKCR | HKMU
key  = "Software\\PowerTech\\MyApp"

  [[platforms.windows.formats.msi.registry.values]]
  name  = "InstallPath"
  type  = "string"                      # string | integer | binary | expandable
  value = "[INSTALLFOLDER]"

  [[platforms.windows.formats.msi.registry.values]]
  name  = "Version"
  type  = "string"
  value = "2.4.1"

# Ярлыки в меню Пуск / на рабочем столе
[[platforms.windows.formats.msi.shortcuts]]
location    = "StartMenu"               # StartMenu | Desktop | ProgramMenuFolder
name        = "MyApp"
target      = "[INSTALLFOLDER]myapp.exe"
arguments   = "--gui"
icon        = "[INSTALLFOLDER]myapp.ico"
description = "Launch MyApp"

# Ассоциации типов файлов
[[platforms.windows.formats.msi.file_associations]]
extension   = ".myapp"
prog_id     = "MyApp.Document"
description = "MyApp Document"
target      = "[INSTALLFOLDER]myapp.exe"
argument    = '"%1"'

# Условия установщика MSI (запрещают установку на неподдерживаемых версиях Windows)
[[platforms.windows.formats.msi.conditions]]
check   = "os_version"
minimum = "6.1"                         # требуется Windows 7 или новее


# ── macOS ─────────────────────────────────────────────────────────────────────

[platforms.macos]
# Идентификатор в обратной DNS-нотации — должен быть уникальным для каждого продукта
identifier = "com.powertech.myapp"

# Файлы только для macOS
[[platforms.macos.files]]
src   = "dist/myapp.plist"
dst   = "/Library/LaunchDaemons/com.powertech.myapp.plist"
mode  = 0o644
owner = "root"
group = "wheel"

[platforms.macos.formats.pkg]
# Component property list управляет поведением установщика для бандлов.
# Для простых CLI-утилит этот раздел обычно не нужен.
[[platforms.macos.formats.pkg.component_plist]]
bundle_path  = "usr/local/bin/myapp"
relocatable  = false

[platforms.macos.formats.dmg]
# Формат образа: ULFO (lzfse) рекомендуется для современных macOS;
# UDZO (zlib) — для максимальной совместимости со старыми системами.
format           = "ULFO"
volume_name      = "MyApp 2.4.1"
background_image = "assets/dmg-background.png"
icon_size        = 96
window_size      = [800, 400]

# Позиции иконок внутри окна DMG
[[platforms.macos.formats.dmg.icon_positions]]
name = "MyApp.app"
x    = 200
y    = 190

[[platforms.macos.formats.dmg.icon_positions]]
name = "Applications"   # символическая ссылка для перетаскивания при установке
x    = 600
y    = 190


# -----------------------------------------------------------------------------
# ПЕРЕОПРЕДЕЛЕНИЯ ДЛЯ АРХИТЕКТУР — [architectures.<arch>]
# -----------------------------------------------------------------------------
#
# Применяются после переопределений платформы. Использовать редко — большинство
# различий уже покрывается подстановкой ${GOARCH} в путях к файлам.

[architectures.arm64]
# Пример: поставляем конфиг тонкой настройки специфичный для arm64

[[architectures.arm64.files]]
src  = "config/myapp-arm64.yaml"
dst  = "/etc/myapp/arch.yaml"
type = "config"
mode = 0o644


# -----------------------------------------------------------------------------
# ПОДПИСЬ — Authenticode (Windows)
# -----------------------------------------------------------------------------
#
# Authenticode применяется в два этапа (порядок важен):
#   1. Подписываем .exe-бинарник ДО упаковки → MSI будет содержать подписанный EXE
#   2. Подписываем .msi ПОСЛЕ того, как wixl его создаст
#
# Инструмент выбирается автоматически по хост-платформе:
#   Хост Linux/macOS → osslsigncode
#   Хост Windows    → signtool.exe
#
# Поддерживаемые форматы сертификата:
#   - Путь к файлу .pfx / .p12
#   - "base64:<base64-encoded-pfx>" — для хранения сертификата в CI-секретах
#   - "env:<VAR_NAME>" — читать путь из переменной окружения
#
# Используйте RFC 3161 timestamp-серверы — подписи останутся валидными после истечения сертификата.
# Несколько URL повышают надёжность: перебираются по порядку.

[sign_windows]
certificate    = "env:WIN_CERT_PFX"        # путь к PFX, base64:... или env:VAR
password       = "env:WIN_CERT_PASS"
timestamp_url  = [
  "http://timestamp.digicert.com",
  "http://timestamp.sectigo.com",
]
hash_algorithm = "sha256"                  # всегда sha256; sha1 устарел
description    = "MyApp by PowerTech"      # отображается в диалоге повышения прав UAC
url            = "https://powertech.example.com"


# -----------------------------------------------------------------------------
# ПОДПИСЬ — Apple Code Signing + нотаризация (macOS)
# -----------------------------------------------------------------------------
#
# Подпись Apple применяется поэтапно:
#   1. Подписываем бинарник ДО упаковки
#   2. Собираем .pkg или .dmg
#   3. Подписываем .pkg / .dmg
#   4. Нотаризируем (отправляем на серверы Apple, ждём тикет)
#   5. Вшиваем тикет нотаризации в файл (staple)
#
# Инструмент выбирается по хост-платформе:
#   Хост macOS         → codesign + notarytool (нативные, требуют Keychain)
#   Хост Linux/Windows → rcodesign (open-source, работает без macOS)
#
# Hardened Runtime (code_signature_flags = "runtime") ОБЯЗАТЕЛЕН для нотаризации.
# Без него Apple отклонит отправку.
#
# entitlements — plist-файл с объявлением возможностей.
# Большинству CLI-утилит entitlements не нужны — поле можно не указывать.
#
# api_key_file — JSON-файл API-ключа App Store Connect для notarytool / rcodesign.

[sign_macos]
certificate          = "env:MAC_CERT_P12"        # путь к .p12, base64:... или env:VAR
password             = "env:MAC_CERT_PASS"

# Для нативного codesign на macOS (идентификатор из Keychain)
identity             = "Developer ID Application: PowerTech LLC (ABCD1234EF)"

# Hardened Runtime — обязателен для нотаризации
code_signature_flags = "runtime"

# Entitlements (обычно пусты для CLI-утилит — раскомментировать при необходимости)
# entitlements = "entitlements.plist"

# Нотаризация через API-ключ App Store Connect
notarize            = true
api_key_file        = "env:NOTARY_API_KEY_JSON"
notary_wait_seconds = 3600

# Вшиваем тикет в пакет (позволяет Gatekeeper проверять подпись офлайн)
staple              = true


# -----------------------------------------------------------------------------
# HOMEBREW-ФОРМУЛА
# -----------------------------------------------------------------------------
#
# Crossler генерирует .rb-формулу из метаданных выше + SHA256 tar.gz-архивов
# (хэши вычисляются автоматически после сборки). Формула записывается в
# homebrew/Formula/myapp.rb и может быть закоммичена в репозиторий Homebrew tap.
#
# Сгенерированная формула скачивает нужный архив для платформы и архитектуры
# пользователя и устанавливает бинарник + man-страницу.
#
# test_command — простая команда для проверки корректности установки.

[homebrew]
tap          = "powertech-center/tap"               # GitHub-репозиторий: powertech-center/homebrew-tap
formula_path = "homebrew/Formula/myapp.rb"
test_command = "myapp --version"
# Дополнительные шаги установки, добавляемые в блок install формулы
install_extras = [
  'bash_completion.install "dist/myapp-completion.bash" => "myapp"',
  'man1.install "docs/myapp.1"',
]
