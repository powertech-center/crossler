# nfpm.yaml — полный пример конфигурации nfpm
#
# nfpm (nFPM is Not FPM) создаёт Linux-пакеты: .deb, .rpm, .apk, .archlinux, .ipk
# Один файл конфига → несколько форматов одной командой:
#   nfpm package -c nfpm.yaml -p deb -t dist/
#   nfpm package -c nfpm.yaml -p rpm -t dist/
#   nfpm package -c nfpm.yaml -p apk -t dist/
#
# Для подстановки переменных рекомендуется envsubst:
#   VERSION=1.2.3 ARCH=amd64 envsubst < nfpm.yaml.tmpl > nfpm.yaml
# ─────────────────────────────────────────────────────────────────────────────


# ═══════════════════════════════════════════════════════════════════════════════
# ОБЯЗАТЕЛЬНЫЕ ПОЛЯ
# ═══════════════════════════════════════════════════════════════════════════════

# Имя пакета — используется как имя в менеджере пакетов (apt, yum, apk)
name: myapp

# Версия — префикс "v" удаляется автоматически (1.2.3 или v1.2.3 — оба корректны)
version: 1.2.3

# Архитектура в GOARCH-нотации — nfpm конвертирует автоматически:
#   amd64 → x86_64 (rpm/apk), amd64 (deb)
#   arm64 → aarch64 (rpm/apk), arm64 (deb)
#   386   → i686 (rpm), i386 (deb), x86 (apk)
arch: amd64


# ═══════════════════════════════════════════════════════════════════════════════
# МЕТАДАННЫЕ ПАКЕТА
# ═══════════════════════════════════════════════════════════════════════════════

# Сопровождающий пакета — имя и email в стандартном формате
maintainer: "PowerTech Center <dev@powertech.center>"

# Описание пакета — поддерживается многострочный блок
# Первая строка — краткое описание (используется как Summary в rpm)
# Остальные строки — подробное описание (используется в long description deb)
description: |
  Cross-platform package creation tool.
  Delegates package building to external backends (nfpm, wixl, pkgbuild, hdiutil).
  Supports .deb, .rpm, .apk, .msi, .pkg, .dmg from a single config file.

# Домашняя страница проекта
homepage: https://github.com/powertech-center/crossler

# SPDX-идентификатор лицензии
# Примеры: MIT, Apache-2.0, GPL-3.0-or-later, BSD-2-Clause
license: MIT

# Организация-производитель (отображается в UI пакетных менеджеров)
vendor: PowerTech Center

# Целевая платформа — почти всегда "linux"
platform: linux


# ═══════════════════════════════════════════════════════════════════════════════
# РАСШИРЕННОЕ ВЕРСИОНИРОВАНИЕ
# ═══════════════════════════════════════════════════════════════════════════════

# RPM epoch — целое число, повышает приоритет версии при сравнении
# Используется когда схема версионирования кардинально изменилась
# (например, переход с date-versioning 20230101 на semantic 1.0.0)
epoch: 0

# Ревизия пакета (не приложения) — номер сборки для конкретного дистрибутива
# Для RPM обязателен: без него сборка может работать некорректно
# Форматы: "1" (универсальный), "1.el9" (RHEL9), "1.fc38" (Fedora 38)
release: "1"

# Метка пре-релиза — влияет на порядок сортировки версий
# Строка добавляется к версии: 1.2.3~beta1 (deb), 1.2.3-0.1.beta1 (rpm)
# Закомментировано для production-релизов
# prerelease: beta1

# Метаданные версии — добавляется после + (по семвер)
# Не используется для сортировки, только информационно
# version_metadata: git.abc1234


# ═══════════════════════════════════════════════════════════════════════════════
# ЗАВИСИМОСТИ ПАКЕТА
# ═══════════════════════════════════════════════════════════════════════════════

# Обязательные зависимости — должны быть установлены до установки пакета
# Синтаксис ограничений версии у каждого формата свой — используй overrides ниже
depends:
  - bash
  - ca-certificates

# Рекомендуемые зависимости — устанавливаются автоматически в apt, но не обязательны
# В rpm эквивалент: Recommends (не у всех дистрибутивов поддерживается)
recommends:
  - curl

# Предлагаемые зависимости — только подсказка, не устанавливаются автоматически
suggests:
  - docker

# Конфликтующие пакеты — не могут быть установлены одновременно с этим пакетом
conflicts:
  - myapp-legacy
  - old-myapp

# Этот пакет заменяет указанные — для корректного обновления при переименовании
replaces:
  - myapp-legacy

# Виртуальные пакеты, которые предоставляет этот пакет
# Позволяет другим пакетам зависеть от "package-builder" вместо конкретного имени
provides:
  - package-builder


# ═══════════════════════════════════════════════════════════════════════════════
# ФАЙЛЫ ПАКЕТА (contents)
# ═══════════════════════════════════════════════════════════════════════════════
#
# src  — источник на машине сборки
# dst  — путь назначения на целевой системе
# type — тип файла (см. ниже)
# file_info — права доступа, владелец, группа
# expand — разворачивать переменные окружения в src/dst (${VAR})
#
# Типы файлов:
#   file          — обычный файл (бинарники, скрипты, данные)
#   config        — конфиг, который будет ПЕРЕЗАПИСАН при обновлении
#   config|noreplace — конфиг, который НЕ перезаписывается (сохраняет правки пользователя)
#   dir           — явная директория с заданными правами/владельцем
#   symlink       — символическая ссылка (src = цель ссылки, dst = путь самой ссылки)
#   ghost         — ghost-файл только для RPM: отслеживается rpm, но не устанавливается
#   doc           — документация (README, CHANGELOG и т.д.)
#   licence       — файл лицензии (псевдоним для doc)
#   tree          — рекурсивно скопировать всё дерево директории

contents:
  # ── Основной исполняемый файл ──────────────────────────────────────────────
  - src: dist/myapp_linux_amd64/myapp
    dst: /usr/bin/myapp
    type: file
    file_info:
      mode: 0755      # исполняемый для всех
      owner: root
      group: root

  # ── Конфиг по умолчанию (сохраняет правки пользователя при обновлении) ────
  - src: config/default.yaml
    dst: /etc/myapp/config.yaml
    type: config|noreplace
    file_info:
      mode: 0640      # чтение для root и группы myapp
      owner: root
      group: myapp

  # ── Конфиг который ПЕРЕЗАПИСЫВАЕТСЯ при обновлении ────────────────────────
  - src: config/system.yaml
    dst: /etc/myapp/system.yaml
    type: config
    file_info:
      mode: 0644

  # ── Systemd unit-файл ─────────────────────────────────────────────────────
  - src: systemd/myapp.service
    dst: /lib/systemd/system/myapp.service
    type: file
    file_info:
      mode: 0644
      owner: root
      group: root

  # ── Systemd environment файл (пример из /etc/default) ─────────────────────
  - src: systemd/myapp.env
    dst: /etc/default/myapp
    type: config|noreplace
    file_info:
      mode: 0640

  # ── Символическая ссылка ──────────────────────────────────────────────────
  # src = цель (куда ссылка указывает), dst = путь самой ссылки
  - src: /usr/bin/myapp
    dst: /usr/local/bin/myapp
    type: symlink

  # ── Директория данных с особым владельцем ─────────────────────────────────
  # type: dir нужен чтобы явно задать права/владельца для пустой директории
  - dst: /var/lib/myapp
    type: dir
    file_info:
      mode: 0750
      owner: myapp
      group: myapp

  # ── Директория логов ──────────────────────────────────────────────────────
  - dst: /var/log/myapp
    type: dir
    file_info:
      mode: 0750
      owner: myapp
      group: myapp

  # ── Ghost-файл (только RPM) ───────────────────────────────────────────────
  # RPM знает о файле, но не устанавливает его физически
  # Используется для логов, PID-файлов и других runtime-файлов
  - dst: /var/log/myapp/myapp.log
    type: ghost
    file_info:
      mode: 0640
      owner: myapp
      group: myapp

  # ── Документация по glob-паттерну ─────────────────────────────────────────
  # Все .md файлы из docs/ установятся в /usr/share/doc/myapp/
  - src: docs/*.md
    dst: /usr/share/doc/myapp/
    type: doc

  # ── Файл лицензии ─────────────────────────────────────────────────────────
  - src: LICENSE
    dst: /usr/share/licenses/myapp/LICENSE
    type: licence

  # ── Man-страница ──────────────────────────────────────────────────────────
  - src: man/myapp.1.gz
    dst: /usr/share/man/man1/myapp.1.gz
    type: file
    file_info:
      mode: 0644

  # ── Shell completion ───────────────────────────────────────────────────────
  - src: completions/myapp.bash
    dst: /etc/bash_completion.d/myapp
    type: file
    file_info:
      mode: 0644

  - src: completions/myapp.zsh
    dst: /usr/share/zsh/site-functions/_myapp
    type: file
    file_info:
      mode: 0644

  # ── Рекурсивное копирование дерева ────────────────────────────────────────
  # Все файлы из src/ попадут в /usr/share/myapp/
  - src: share/
    dst: /usr/share/myapp/
    type: tree

  # ── Файл с расширением переменных окружения ───────────────────────────────
  # expand: true разворачивает ${VAR} из окружения в src и dst
  - src: dist/${GOOS}_${GOARCH}/myapp
    dst: /usr/bin/myapp
    type: file
    expand: true
    file_info:
      mode: 0755


# ═══════════════════════════════════════════════════════════════════════════════
# СКРИПТЫ ЖИЗНЕННОГО ЦИКЛА
# ═══════════════════════════════════════════════════════════════════════════════
#
# Маппинг на форматы:
#   preinstall  → deb: preinst,  rpm: %pre,    apk: pre-install
#   postinstall → deb: postinst, rpm: %post,   apk: post-install
#   preremove   → deb: prerm,    rpm: %preun,  apk: pre-deinstall
#   postremove  → deb: postrm,   rpm: %postun, apk: post-deinstall
#
# Порядок при обновлении:
#   1. preinstall (новой)
#   2. Установка файлов новой версии
#   3. postinstall (новой)
#   4. preremove (старой)
#   5. Удаление файлов старой версии
#   6. postremove (старой)

scripts:
  preinstall:  scripts/preinstall.sh   # создать пользователя/группу ДО установки файлов
  postinstall: scripts/postinstall.sh  # запустить systemd, настроить пути ПОСЛЕ установки
  preremove:   scripts/preremove.sh    # остановить сервис ПЕРЕД удалением файлов
  postremove:  scripts/postremove.sh   # перезагрузить systemd ПОСЛЕ удаления


# ═══════════════════════════════════════════════════════════════════════════════
# DEB-СПЕЦИФИЧНЫЕ ПОЛЯ (верхний уровень — используются как fallback)
# ═══════════════════════════════════════════════════════════════════════════════

deb:
  # Предварительные зависимости — должны быть настроены ДО распаковки пакета
  # (не просто установлены, а полностью настроены — это строже чем depends)
  predepends:
    - libc6 (>= 2.17)

  # Пакеты которые этот пакет нарушает — при наличии старой версии
  # apt предложит удалить conflicting пакет
  breaks:
    - myapp-old (< 2.0)

  # Пакеты которые этот пакет улучшает (информационно)
  enhances:
    - some-framework

  # Триггеры — механизм уведомлений между пакетами
  triggers:
    # Этот пакет интересуется изменениями в указанном пути
    interest:
      - /usr/lib/python3/dist-packages
    # Этот пакет активирует триггер при установке
    activate:
      - libc-bin

  # Подпись deb-пакета через GPG
  # signature:
  #   key_id: ABCDEF1234567890      # fingerprint GPG-ключа
  #   key_file: /path/to/key.gpg    # или путь к файлу ключа
  #   signer: "Name <email>"        # имя подписанта


# ═══════════════════════════════════════════════════════════════════════════════
# RPM-СПЕЦИФИЧНЫЕ ПОЛЯ (верхний уровень)
# ═══════════════════════════════════════════════════════════════════════════════

rpm:
  # Алгоритм сжатия содержимого RPM:
  #   gzip  — максимальная совместимость (по умолчанию)
  #   zstd  — быстрее при установке, хорошее сжатие (RHEL9+, Fedora)
  #   lzma  — хорошее сжатие, медленнее
  #   xz    — максимальное сжатие, медленнее
  compression: zstd

  # RPM group (устарело, но некоторые дистрибутивы всё ещё используют)
  # group: "System Environment/Daemons"

  # Summary — отдельная краткая строка (если не задана, берётся первая строка description)
  # summary: "Cross-platform package creation tool"

  # Дополнительные скрипты специфичные для rpm (сверх стандартных preinstall/postinstall)
  scripts:
    # Выполняется перед транзакцией (до preinstall)
    pretrans:  scripts/rpm-pretrans.sh
    # Выполняется после транзакции (после postinstall всех пакетов)
    posttrans: scripts/rpm-posttrans.sh
    # Выполняется при команде rpm --verify
    verify:    scripts/rpm-verify.sh


# ═══════════════════════════════════════════════════════════════════════════════
# APK-СПЕЦИФИЧНЫЕ ПОЛЯ (верхний уровень)
# ═══════════════════════════════════════════════════════════════════════════════

apk:
  # Подпись APK через RSA (Alpine использует RSA, не PGP)
  # signature:
  #   key_file: /etc/apk/keys/signing.rsa.key  # RSA приватный ключ
  #   key_id: keyname                           # имя ключа (суффикс .rsa.pub файла)


# ═══════════════════════════════════════════════════════════════════════════════
# ПЕРЕОПРЕДЕЛЕНИЯ ПО ФОРМАТАМ (overrides)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Позволяет переопределить ЛЮБОЕ поле верхнего уровня для конкретного формата.
# Поля из overrides полностью заменяют (не дополняют) соответствующие поля верхнего уровня.
# Исключение: contents — объединяется с верхним уровнем.

overrides:
  # ── Переопределения для .deb ───────────────────────────────────────────────
  deb:
    # deb-стиль ограничений версии зависимостей: имя (>= версия)
    depends:
      - bash (>= 4.0)
      - ca-certificates
      # OR-зависимость: любой из двух пакетов
      - libssl1.1 | libssl3

    # Отдельный postinstall для deb (вместо общего)
    scripts:
      preinstall:  scripts/deb-preinstall.sh
      postinstall: scripts/deb-postinstall.sh
      preremove:   scripts/deb-preremove.sh
      postremove:  scripts/deb-postremove.sh

    # deb-специфичные поля внутри overrides
    deb:
      predepends:
        - libc6 (>= 2.17)

  # ── Переопределения для .rpm ───────────────────────────────────────────────
  rpm:
    # Ревизия специфичная для дистрибутива
    # release: "1.el9"  # для RHEL/CentOS Stream 9
    # release: "1.fc40" # для Fedora 40
    release: "1"

    # rpm-стиль ограничений версии: имя >= версия (без скобок)
    depends:
      - bash >= 4.0
      - ca-certificates
      - openssl >= 1.1

    rpm:
      compression: gzip  # gzip для максимальной совместимости со старыми RHEL

  # ── Переопределения для .apk ───────────────────────────────────────────────
  apk:
    # apk-стиль ограничений версии: имя>=версия (без пробелов)
    depends:
      - bash>=4.0
      - ca-certificates

  # ── Переопределения для .archlinux ────────────────────────────────────────
  archlinux:
    depends:
      - bash
      - ca-certificates
