# nfpm.yaml — полный пример конфигурации nfpm v2.x
#
# nfpm (nFPM is Not FPM) создаёт Linux-пакеты из одного конфига:
#   .deb  (Debian, Ubuntu)
#   .rpm  (RHEL, Fedora, CentOS, openSUSE)
#   .apk  (Alpine Linux)
#   .archlinux (.zst, Arch Linux / Manjaro)
#   .ipk  (OpenWrt)
#
# Команды:
#   nfpm package -c nfpm.yaml -p deb -t dist/
#   nfpm package -c nfpm.yaml -p rpm -t dist/
#   nfpm package -c nfpm.yaml -p apk -t dist/
#   nfpm package -c nfpm.yaml -p archlinux -t dist/
#   nfpm package -c nfpm.yaml -p ipk -t dist/
#
# Переменные окружения: nfpm поддерживает подстановку через envsubst перед запуском.
# Некоторые поля (arch, version, maintainer и др.) также разворачивают ${VAR} напрямую.
# ─────────────────────────────────────────────────────────────────────────────


# ═══════════════════════════════════════════════════════════════════════════════
# ОБЯЗАТЕЛЬНЫЕ ПОЛЯ
# ═══════════════════════════════════════════════════════════════════════════════

# Имя пакета в менеджере пакетов (apt, yum, apk add).
name: myapp

# Версия. Префикс "v" удаляется автоматически (1.2.3 и v1.2.3 — оба корректны).
# Поддерживает ${VAR} из окружения.
version: 1.2.3

# Архитектура в GOARCH-нотации — nfpm конвертирует автоматически для каждого формата:
#   amd64  → x86_64 (rpm/apk/arch), amd64 (deb)
#   arm64  → aarch64 (rpm/apk/arch), arm64 (deb)
#   386    → i686 (rpm), i386 (deb), x86 (apk)
#   arm    → armhf (deb), armv7hl (rpm) — зависит от GOARM
#   ppc64le, s390x, mips, mipsle — тоже поддерживаются
# Поддерживает ${VAR} из окружения.
arch: amd64


# ═══════════════════════════════════════════════════════════════════════════════
# МЕТАДАННЫЕ ПАКЕТА
# ═══════════════════════════════════════════════════════════════════════════════

# Целевая платформа. Почти всегда "linux".
platform: linux

# Схема парсинга версии:
#   semver — стандартный semver (по умолчанию): epoch.version~prerelease+metadata
#   none   — версия передаётся as-is без разбора
version_schema: semver

# RPM epoch — целое число как строка. Повышает приоритет при сравнении версий.
# Используется при кардинальной смене схемы версионирования.
# При version_schema=semver вычленяется автоматически; иначе задаётся явно.
epoch: "0"

# Ревизия пакета (номер сборки, не приложения).
# Для rpm обязателен: без него пакет может не устанавливаться.
# Форматы: "1" (универсальный), "1.el9" (RHEL9), "1.fc40" (Fedora 40).
release: "1"

# Метка пре-релиза. Влияет на порядок сортировки версий.
# deb: добавляется как ~beta1 (1.2.3~beta1 < 1.2.3).
# rpm: 1.2.3-0.1.beta1
# prerelease: beta1

# Метаданные версии (после +, по semver). Не участвует в сортировке.
# version_metadata: git.abc1234

# Сопровождающий пакета. Поддерживает ${VAR}.
maintainer: "PowerTech Center <dev@powertech.center>"

# Описание. Первая строка — краткая аннотация (Summary в rpm).
# Остальные строки — подробное описание (long description в deb).
description: |
  Cross-platform package creation tool.
  Delegates package building to external backends (nfpm, wixl, pkgbuild, hdiutil).
  Supports .deb, .rpm, .apk, .msi, .pkg, .dmg from a single config file.

# Организация-поставщик. Используется rpm. Поддерживает ${VAR}.
vendor: PowerTech Center

# URL проекта. Поддерживает ${VAR}.
homepage: https://github.com/powertech-center/crossler

# SPDX-идентификатор лицензии.
license: MIT

# Раздел пакета (Debian policy section). Используется только deb.
# Примеры: misc, net, admin, utils, devel, libs, x11
section: utils

# Приоритет пакета. Используется только deb.
# Значения: optional (по умолчанию), required, standard, extra
priority: optional

# Путь к YAML-файлу changelog в формате chglog.
# Используется deb и rpm для генерации changelog раздела.
# changelog: changelog.yaml

# Отключить glob-паттерны в contents[].src.
# Полезно если пути содержат символы [ ] ? * и не должны раскрываться.
disable_globbing: false

# Время модификации для файлов внутри пакета (для воспроизводимых сборок).
# Формат: Unix timestamp ("1234567890") или RFC3339 ("2024-01-01T00:00:00Z").
# По умолчанию используется $SOURCE_DATE_EPOCH если задан, иначе текущее время.
# mtime: "2024-01-01T00:00:00Z"


# ═══════════════════════════════════════════════════════════════════════════════
# ЗАВИСИМОСТИ (Overridables — можно переопределить в overrides.*)
# ═══════════════════════════════════════════════════════════════════════════════

# Обязательные зависимости.
# Синтаксис ограничений версии различается — используй overrides для точного контроля.
depends:
  - bash
  - ca-certificates

# Рекомендуемые зависимости.
# apt устанавливает автоматически; rpm поддерживает не везде.
recommends:
  - curl

# Предлагаемые зависимости — только подсказка, не устанавливаются автоматически.
suggests:
  - docker

# Пакеты, которые этот пакет заменяет (при переименовании).
replaces:
  - myapp-legacy

# Виртуальные пакеты, которые предоставляет этот пакет.
provides:
  - package-builder

# Конфликтующие пакеты — не могут быть установлены одновременно.
conflicts:
  - myapp-legacy
  - old-myapp


# ═══════════════════════════════════════════════════════════════════════════════
# UMASK — применяется к файлам без явного mode в file_info
# ═══════════════════════════════════════════════════════════════════════════════

# Убирает биты из прав файлов, у которых не задан явный mode.
# По умолчанию 0o002 — убирает world-writable бит.
# 0o022 — стандартный системный umask (убирает group-write и world-write).
umask: 0o002


# ═══════════════════════════════════════════════════════════════════════════════
# ФАЙЛЫ ПАКЕТА (contents)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Каждый элемент:
#   src        — источник на машине сборки (glob, если не отключён)
#   dst        — путь назначения на целевой системе (обязателен)
#   type       — тип файла (см. ниже)
#   packager   — применить только для конкретного пакетера (deb/rpm/apk/archlinux/ipk)
#   expand     — разворачивать ${VAR} из окружения в src и dst
#   file_info  — явные права, владелец, группа, mtime
#
# Типы файлов:
#   file              — обычный файл (по умолчанию если type пустой)
#   config            — конфиг; поведение при обновлении зависит от формата
#   config|noreplace  — конфиг, НЕ перезаписывается при обновлении
#                       (dpkg: conffile; rpm: %config(noreplace))
#   config|missingok  — конфиг, не вызывает ошибку если файл отсутствует
#                       (rpm: %config(missingok))
#   dir               — явная директория с заданными правами/владельцем
#   symlink           — символическая ссылка (src=цель, dst=путь ссылки)
#   ghost             — только RPM: файл отслеживается rpm, но не устанавливается
#   tree              — рекурсивно скопировать всё дерево src в dst

contents:
  # ── Основной исполняемый файл ──────────────────────────────────────────────
  - src: dist/myapp_linux_amd64/myapp
    dst: /usr/bin/myapp
    file_info:
      mode: 0755
      owner: root
      group: root

  # ── Конфиг, который НЕ перезаписывается при обновлении ────────────────────
  - src: config/default.yaml
    dst: /etc/myapp/config.yaml
    type: config|noreplace
    file_info:
      mode: 0640
      owner: root
      group: myapp

  # ── Конфиг, который ПЕРЕЗАПИСЫВАЕТСЯ при обновлении ───────────────────────
  - src: config/system.yaml
    dst: /etc/myapp/system.yaml
    type: config
    file_info:
      mode: 0644

  # ── Config с missingok (только rpm: %config(missingok)) ───────────────────
  - src: config/optional.yaml
    dst: /etc/myapp/optional.yaml
    type: config|missingok
    packager: rpm
    file_info:
      mode: 0644

  # ── Systemd unit-файл ─────────────────────────────────────────────────────
  - src: systemd/myapp.service
    dst: /lib/systemd/system/myapp.service
    file_info:
      mode: 0644

  # ── Systemd environment файл ───────────────────────────────────────────────
  - src: systemd/myapp.env
    dst: /etc/default/myapp
    type: config|noreplace
    file_info:
      mode: 0640

  # ── Символическая ссылка ──────────────────────────────────────────────────
  # src = цель (куда ссылка указывает), dst = путь самой ссылки
  - src: /usr/bin/myapp
    dst: /usr/local/bin/myapp
    type: symlink

  # ── Директория с особыми правами и владельцем ─────────────────────────────
  - dst: /var/lib/myapp
    type: dir
    file_info:
      mode: 0750
      owner: myapp
      group: myapp

  # ── Директория логов ──────────────────────────────────────────────────────
  - dst: /var/log/myapp
    type: dir
    file_info:
      mode: 0750
      owner: myapp
      group: myapp

  # ── Ghost-файл (только RPM: %ghost) ───────────────────────────────────────
  # RPM знает об этом файле, но не устанавливает его физически.
  # Используется для log-файлов, pid-файлов и других runtime-артефактов.
  - dst: /var/log/myapp/myapp.log
    type: ghost
    packager: rpm
    file_info:
      mode: 0640
      owner: myapp
      group: myapp

  # ── Glob-паттерн: все .md файлы ───────────────────────────────────────────
  - src: docs/*.md
    dst: /usr/share/doc/myapp/
    file_info:
      mode: 0644

  # ── Рекурсивное копирование дерева ────────────────────────────────────────
  - src: share/myapp/
    dst: /usr/share/myapp/
    type: tree

  # ── Man-страница ──────────────────────────────────────────────────────────
  - src: man/myapp.1.gz
    dst: /usr/share/man/man1/myapp.1.gz
    file_info:
      mode: 0644

  # ── Shell completions ──────────────────────────────────────────────────────
  - src: completions/myapp.bash
    dst: /etc/bash_completion.d/myapp
    file_info:
      mode: 0644

  - src: completions/myapp.zsh
    dst: /usr/share/zsh/site-functions/_myapp
    file_info:
      mode: 0644

  - src: completions/myapp.fish
    dst: /usr/share/fish/vendor_completions.d/myapp.fish
    file_info:
      mode: 0644

  # ── Файл с явным mtime (для воспроизводимых сборок) ──────────────────────
  - src: LICENSE
    dst: /usr/share/licenses/myapp/LICENSE
    file_info:
      mode: 0644
      mtime: "2024-01-01T00:00:00Z"

  # ── Только для deb: специфичный файл ──────────────────────────────────────
  - src: debian/myapp.lintian-overrides
    dst: /usr/share/lintian/overrides/myapp
    packager: deb
    file_info:
      mode: 0644

  # ── Только для rpm: специфичный файл ──────────────────────────────────────
  - src: rpm/myapp.rpmlintrc
    dst: /etc/rpmlint/myapp.rpmlintrc
    packager: rpm
    file_info:
      mode: 0644

  # ── Расширение переменных окружения в путях ────────────────────────────────
  # expand: true разворачивает ${VAR} из окружения в src и dst
  - src: dist/${GOOS}_${GOARCH}/myapp
    dst: /usr/bin/myapp
    expand: true
    file_info:
      mode: 0755


# ═══════════════════════════════════════════════════════════════════════════════
# СКРИПТЫ ЖИЗНЕННОГО ЦИКЛА
# ═══════════════════════════════════════════════════════════════════════════════
#
# Маппинг на форматы:
#   preinstall  → deb: preinst,  rpm: %pre,    apk: pre-install
#   postinstall → deb: postinst, rpm: %post,   apk: post-install
#   preremove   → deb: prerm,    rpm: %preun,  apk: pre-deinstall
#   postremove  → deb: postrm,   rpm: %postun, apk: post-deinstall
#
# Порядок при обновлении:
#   preinstall(новой) → файлы новой → postinstall(новой)
#   → preremove(старой) → удаление старых файлов → postremove(старой)

scripts:
  preinstall:  scripts/preinstall.sh
  postinstall: scripts/postinstall.sh
  preremove:   scripts/preremove.sh
  postremove:  scripts/postremove.sh


# ═══════════════════════════════════════════════════════════════════════════════
# DEB-СПЕЦИФИЧНЫЕ ПОЛЯ (верхний уровень)
# ═══════════════════════════════════════════════════════════════════════════════

deb:
  # Переопределение имени архитектуры без автоматического маппинга.
  # arch: amd64v3

  # Вариант архитектуры (microarchitecture levels).
  # Значения: amd64v1, amd64v2, amd64v3, amd64v4
  # arch_variant: amd64v2

  # Алгоритм сжатия data.tar:
  #   gzip  — по умолчанию, максимальная совместимость
  #   xz    — лучшее сжатие
  #   zstd  — быстрая распаковка (требует dpkg >= 1.21.18)
  #   none  — без сжатия
  # Можно указать уровень: xz:9, zstd:19
  compression: xz

  # Pre-Depends: пакеты, которые должны быть полностью настроены ДО распаковки.
  # Строже чем Depends — используется редко.
  predepends:
    - libc6 (>= 2.17)

  # Breaks: пакеты, которые "сломаются" при установке этого пакета.
  # apt предложит обновить или удалить сломанный пакет.
  breaks:
    - myapp-old (< 2.0)

  # Произвольные поля control-файла (для нестандартных расширений).
  # Поддерживают ${VAR}.
  fields:
    XB-Rust-Version: "1.75.0"
    XB-Go-Version: "1.22.0"

  # Триггеры — механизм уведомлений между пакетами Debian.
  triggers:
    # interest: этот пакет интересуется триггером; активируется после его срабатывания.
    interest:
      - /usr/lib/python3/dist-packages
    # interest_await: interest с явной await-семантикой (ожидать завершения обработчика).
    interest_await:
      - /usr/share/fonts
    # interest_noawait: interest без ожидания завершения обработчика.
    interest_noawait:
      - /usr/share/icons

    # activate: этот пакет активирует триггер другого пакета при установке.
    activate:
      - ldconfig
    # activate_await: активация с ожиданием.
    activate_await:
      - mime-support
    # activate_noawait: активация без ожидания.
    activate_noawait:
      - man-db

  # Дополнительные deb-специфичные скрипты.
  scripts:
    # debconf rules-файл (Makefile для deb-пакета).
    # rules: debian/rules
    # debconf templates — диалоги для пользователя при установке.
    templates: scripts/deb-templates
    # debconf config — скрипт для сбора ответов через debconf.
    config: scripts/deb-config

  # Подпись deb-пакета через PGP.
  # signature:
  #   key_file: /path/to/secret.gpg    # ASCII-armored или бинарный PGP-ключ
  #   key_id: ABCDEF1234567890         # hex ID ключа (если не задан — первый signing subkey)
  #   method: debsign                  # debsign (по умолчанию) или dpkg-sig
  #   type: origin                     # origin (по умолчанию), maint, archive
  #   signer: "Name <email>"           # для метода dpkg-sig
  # Пароль ключа: переменная окружения NFPM_DEB_PASSPHRASE


# ═══════════════════════════════════════════════════════════════════════════════
# RPM-СПЕЦИФИЧНЫЕ ПОЛЯ (верхний уровень)
# ═══════════════════════════════════════════════════════════════════════════════

rpm:
  # Переопределение имени архитектуры без автоматического маппинга.
  # arch: x86_64

  # Имя хоста машины сборки (RPMTAG_BUILDHOST).
  # По умолчанию: os.Hostname()
  # buildhost: build.powertech.center

  # Группа пакета (deprecated, но некоторые старые дистрибутивы требуют).
  # group: "System Environment/Daemons"

  # Явная краткая аннотация (Summary).
  # Если не задана — берётся первая строка description.
  summary: "Cross-platform package creation tool"

  # Организация, собирающая пакет (отличается от vendor).
  packager: "PowerTech Center <dev@powertech.center>"

  # Алгоритм сжатия RPM:
  #   gzip  — максимальная совместимость (по умолчанию)
  #   zstd  — быстрая распаковка, хорошее сжатие (RHEL9+, Fedora)
  #   lzma  — хорошее сжатие
  #   xz    — максимальное сжатие
  # Можно указать уровень: gzip:9, zstd:18
  compression: zstd

  # Пути для relocatable-пакетов (RPMTAG_PREFIXES).
  # Позволяет пользователю изменить путь установки через rpm --prefix.
  # prefixes:
  #   - /usr

  # Дополнительные rpm-специфичные скрипты (сверх preinstall/postinstall).
  scripts:
    # %pretrans — выполняется перед транзакцией (до preinstall всех пакетов).
    pretrans:  scripts/rpm-pretrans.sh
    # %posttrans — выполняется после транзакции (после postinstall всех пакетов).
    posttrans: scripts/rpm-posttrans.sh
    # %verify — выполняется при rpm --verify.
    verify:    scripts/rpm-verify.sh

  # Подпись rpm-пакета через PGP.
  # signature:
  #   key_file: /path/to/secret.gpg    # ASCII-armored или бинарный PGP-ключ
  #   key_id: ABCDEF1234567890         # hex ID ключа
  # Пароль ключа: переменная окружения NFPM_RPM_PASSPHRASE


# ═══════════════════════════════════════════════════════════════════════════════
# APK-СПЕЦИФИЧНЫЕ ПОЛЯ (верхний уровень)
# ═══════════════════════════════════════════════════════════════════════════════

apk:
  # Переопределение имени архитектуры без автоматического маппинга.
  # arch: x86_64

  # Дополнительные apk-специфичные скрипты.
  scripts:
    # Выполняется перед обновлением пакета.
    preupgrade:  scripts/apk-preupgrade.sh
    # Выполняется после обновления пакета.
    postupgrade: scripts/apk-postupgrade.sh

  # Подпись apk-пакета через RSA (Alpine использует RSA, не PGP).
  # signature:
  #   key_file: /etc/apk/keys/signing.rsa.key   # RSA приватный ключ (PEM)
  #   key_name: dev@powertech.center.rsa.pub     # имя ключа (суффикс .rsa.pub файла)
  # Пароль ключа: переменная окружения NFPM_APK_PASSPHRASE


# ═══════════════════════════════════════════════════════════════════════════════
# ARCHLINUX-СПЕЦИФИЧНЫЕ ПОЛЯ (верхний уровень)
# ═══════════════════════════════════════════════════════════════════════════════

archlinux:
  # Переопределение имени архитектуры без автоматического маппинга.
  # arch: x86_64

  # Имя группы split-пакетов (pkgbase в PKGBUILD).
  # По умолчанию совпадает с name.
  pkgbase: myapp

  # Организация, собирающая пакет.
  packager: "PowerTech Center <dev@powertech.center>"

  # Дополнительные archlinux-специфичные скрипты.
  scripts:
    # Выполняется перед обновлением.
    preupgrade:  scripts/arch-preupgrade.sh
    # Выполняется после обновления.
    postupgrade: scripts/arch-postupgrade.sh


# ═══════════════════════════════════════════════════════════════════════════════
# IPK-СПЕЦИФИЧНЫЕ ПОЛЯ (верхний уровень, OpenWrt)
# ═══════════════════════════════════════════════════════════════════════════════

ipk:
  # Переопределение имени архитектуры.
  # arch: x86_64

  # ABI-версия — добавляется к имени пакета для сосуществования разных версий ABI.
  # Например: myapp_1.2.3_amd64_abi2.ipk
  # abi_version: "2"

  # Помечает пакет как автоматически установленную зависимость.
  # opkg autoremove удалит его если нет зависящих пакетов.
  auto_installed: false

  # Помечает как essential — нельзя удалить.
  essential: false

  # Pre-Depends (аналогично deb).
  predepends:
    - libc6

  # Теги для категоризации и фильтрации пакетов в OpenWrt.
  tags:
    - network
    - tool

  # Произвольные поля control-файла.
  fields:
    Source: "https://github.com/powertech-center/myapp"

  # Альтернативы — механизм update-alternatives для OpenWrt.
  alternatives:
    - link_name: /usr/bin/pkg-builder  # путь создаваемого симлинка
      target: /usr/bin/myapp           # цель симлинка
      priority: 100                    # приоритет альтернативы


# ═══════════════════════════════════════════════════════════════════════════════
# ПЕРЕОПРЕДЕЛЕНИЯ ПО ФОРМАТАМ (overrides)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Любое поле из Overridables (depends, scripts, contents, umask, rpm, deb и т.д.)
# можно переопределить для конкретного формата. Поля из overrides ЗАМЕНЯЮТ
# (не дополняют) соответствующие поля верхнего уровня.

overrides:
  # ── Переопределения для .deb ───────────────────────────────────────────────
  deb:
    # deb-синтаксис ограничений версии: имя (>= версия) или OR через |
    depends:
      - bash (>= 4.0)
      - ca-certificates
      - libssl1.1 | libssl3

    scripts:
      preinstall:  scripts/deb-preinstall.sh
      postinstall: scripts/deb-postinstall.sh
      preremove:   scripts/deb-preremove.sh
      postremove:  scripts/deb-postremove.sh

    deb:
      compression: gzip   # gzip для совместимости со старыми dpkg

  # ── Переопределения для .rpm ───────────────────────────────────────────────
  rpm:
    release: "1"

    # rpm-синтаксис: имя >= версия (без скобок)
    depends:
      - bash >= 4.0
      - ca-certificates
      - openssl >= 1.1

    scripts:
      preinstall:  scripts/rpm-preinstall.sh
      postinstall: scripts/rpm-postinstall.sh
      preremove:   scripts/rpm-preremove.sh
      postremove:  scripts/rpm-postremove.sh

    rpm:
      compression: gzip

  # ── Переопределения для .apk ───────────────────────────────────────────────
  apk:
    # apk-синтаксис: имя>=версия (без пробелов)
    depends:
      - bash>=4.0
      - ca-certificates

  # ── Переопределения для .archlinux ────────────────────────────────────────
  archlinux:
    depends:
      - bash
      - ca-certificates

  # ── Переопределения для .ipk ───────────────────────────────────────────────
  ipk:
    depends:
      - bash
      - ca-certificates
